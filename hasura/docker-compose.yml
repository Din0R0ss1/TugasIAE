services:
  hasura:
    image: hasura/graphql-engine:v2.42.0
    container_name: hasura
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:secret@book-db:5432/book_db
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
    networks:
      - perpus-network

  hasura-init:
    image: curlimages/curl:latest
    container_name: hasura-init
    depends_on:
      - hasura
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for Hasura to be ready..."
        sleep 10
        echo "Tracking books table..."
        curl -s -X POST http://hasura:8080/v1/query \
          -H "Content-Type: application/json" \
          -H "X-Hasura-Admin-Secret: myadminsecretkey" \
          -d '{"type":"track_table","args":{"schema":"public","name":"books"}}'
        echo ""
        echo "Tracking complete."
    networks:
      - perpus-network

networks:
  perpus-network:
    external: true
