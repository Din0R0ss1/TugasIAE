services:
  gateway-service:
    build: ./gateway-perpus
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - USER_SERVICE_URL=http://user-service:8000
      - BOOK_SERVICE_URL=http://book-service:8000
      - LOAN_SERVICE_URL=http://loan-service:8000
    depends_on:
      - user-service
      - book-service
      - loan-service
    volumes:
      - gateway-db-data:/app/database
    networks:
      - perpus-network
  user-service:
    build: ./user-service
    ports:
      - "8001:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=user-db
      - DB_DATABASE=user_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - user-db
      - rabbitmq
    networks:
      - perpus-network
  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=book-db
      - DB_DATABASE=book_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - book-db
      - rabbitmq
    networks:
      - perpus-network
  loan-service:
    build: ./loan-service
    ports:
      - "8003:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=loan-db
      - DB_DATABASE=loan_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - loan-db
      - rabbitmq
    networks:
      - perpus-network
  # ===== BOOK WORKER =====
  book-worker:
    build: ./book-service
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=book-db
      - DB_DATABASE=book_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - RABBITMQ_HOST=rabbitmq
      - QUEUE_CONNECTION=rabbitmq
      - CACHE_STORE=file
    depends_on:
      - book-db
      - rabbitmq
    networks:
      - perpus-network
    command: bash -c "sleep 15 && php artisan queue:work --queue=book-loan --tries=3"
  # ===== LOAN HISTORY WORKER (NEW) =====
  loan-history-worker:
    build: ./user-service
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=user-db
      - DB_DATABASE=user_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - RABBITMQ_HOST=rabbitmq
      - QUEUE_CONNECTION=rabbitmq
      - CACHE_STORE=file
    depends_on:
      - user-db
      - rabbitmq
    networks:
      - perpus-network
    command: bash -c "sleep 15 && php artisan queue:work --queue=loan-history --tries=3"
  # ===== DATABASES =====
  user-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: user_db
    volumes:
      - user-db-data:/var/lib/mysql
    networks:
      - perpus-network
  book-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: book_db
    volumes:
      - book-db-data:/var/lib/mysql
    networks:
      - perpus-network
  loan-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: loan_db
    volumes:
      - loan-db-data:/var/lib/mysql
    networks:
      - perpus-network
  # ===== RABBITMQ =====
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - perpus-network
networks:
  perpus-network:
    driver: bridge
volumes:
  user-db-data:
  book-db-data:
  loan-db-data:
  rabbitmq-data:
  gateway-db-data: