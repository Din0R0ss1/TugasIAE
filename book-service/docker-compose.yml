services:
  book-db:
    image: postgres:15
    container_name: book-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: book_db
    volumes:
      - book-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perpus-network

  book-migrate:
    build: .
    container_name: book-migrate
    command: bash -c "cp .env.example .env && sed -i 's/DB_HOST=127.0.0.1/DB_HOST=book-db/' .env && sleep 5 && php artisan migrate --force && php artisan db:seed --force"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=book-db
      - DB_PORT=5432
      - DB_DATABASE=book_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
    depends_on:
      book-db:
        condition: service_healthy
    networks:
      - perpus-network

  book-worker:
    build: .
    container_name: book-worker
    command: bash -c "cp .env.example .env && sed -i 's/DB_HOST=127.0.0.1/DB_HOST=book-db/' .env && sleep 15 && php artisan queue:work --queue=book-loan --tries=3"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=book-db
      - DB_PORT=5432
      - DB_DATABASE=book_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=rabbitmq
      - RABBITMQ_HOST=rabbitmq
      - CACHE_STORE=file
    depends_on:
      book-db:
        condition: service_healthy
    networks:
      - perpus-network

networks:
  perpus-network:
    external: true

volumes:
  book-db-data:
