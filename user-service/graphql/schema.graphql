"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type User {
    id: ID!
    name: String!
    email: String!
    created_at: DateTime
    updated_at: DateTime
    loan_histories: [LoanHistory!]! @hasMany(relation: "loanHistories")
}

type LoanHistory {
    id: ID!
    user_id: Int!
    book_id: Int!
    loan_id: Int!
    action: String!
    loan_date: DateTime
    return_date: DateTime
    created_at: DateTime
    updated_at: DateTime
    user: User! @belongsTo
}

type Query {
    users: [User!]! @all
    user(id: ID! @eq): User @find
}

type Mutation {
    createUser(name: String!, email: String!, password: String @hash): User! @create
    updateUser(id: ID!, name: String!, email: String!): User! @update
    deleteUser(id: ID!): User @delete
}
